<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BarberPro Mobile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="mobile-header">
        <h1>Barber<span>Pro</span></h1>
    </header>

    <main class="container-mobile">
        <section id="view-dash" class="view-section">
            <div class="stats-grid">
                <div class="card-stat"><h4>Caixa Casa</h4><p id="dash-caixa">R$ 0,00</p></div>
                <div class="card-stat"><h4>Agenda</h4><p id="dash-agenda-count">0</p></div>
            </div>
            <button class="btn-primary" onclick="app.renderView('add-agenda')">+ Novo Agendamento</button>
        </section>

        <section id="view-agenda" class="view-section" style="display:none">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <h3>Agenda Geral</h3>
                <div>
                    <button class="btn-small" style="background:#444; color:white" onclick="app.renderView('historico')">📜 Histórico</button>
                    <button class="btn-small" onclick="app.compartilharLink()">🔗 Link</button>
                </div>
            </div><br>
            <input type="text" placeholder="🔍 Buscar na agenda..." oninput="app.filtrarLista('agenda', this.value)" style="margin-bottom:15px">
            <div id="lista-agenda-content"></div>
        </section>

        <section id="view-historico" class="view-section" style="display:none">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
                <h3>Histórico / Gestão</h3>
                <button class="btn-small" style="background:#333; color:white" onclick="app.renderView('agenda')">Voltar</button>
            </div>

            <div style="display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px;">
                <button class="btn-small" onclick="app.setFiltroRapido('hoje')">Hoje</button>
                <button class="btn-small" onclick="app.setFiltroRapido('mes')">Mês</button>
                <button class="btn-small" style="background:#444; color:#fff" onclick="app.setFiltroRapido('limpar')">Limpar</button>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px">
                <div>
                    <label style="font-size:10px; color:#888">Data:</label>
                    <input type="date" id="filtro-data-hist" onchange="app.filtrarHistorico()">
                </div>
                <div>
                    <label style="font-size:10px; color:#888">Mês:</label>
                    <input type="month" id="filtro-mes-hist" onchange="app.filtrarHistorico()">
                </div>
            </div>
            <div id="lista-historico-content" class="lista-box"></div>
        </section>

        <section id="view-prestadores" class="view-section" style="display:none">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <h3>Equipe</h3>
                <button class="btn-small" onclick="app.prepararEdicaoPrestador()">+ Novo</button>
            </div><br>
            <div id="lista-pre"></div>
        </section>

        <section id="view-estoque" class="view-section" style="display:none">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <h3>Estoque</h3>
                <button class="btn-small" onclick="app.prepararEdicaoEstoque()">+ Item</button>
            </div><br>
            <input type="text" placeholder="🔍 Pesquisar no estoque..." oninput="app.filtrarLista('estoque', this.value)" style="margin-bottom:15px">
            <div class="lista-box" id="lista-estoque-content"></div>
        </section>

        <section id="view-servicos" class="view-section" style="display:none">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <h3>Serviços</h3>
                <button class="btn-small" onclick="app.prepararEdicaoServico()">+ Novo</button>
            </div><br>
            <input type="text" placeholder="🔍 Pesquisar serviço..." oninput="app.filtrarLista('servicos', this.value)" style="margin-bottom:15px">
            <div class="lista-box" id="lista-servicos-content"></div>
        </section>
    </main>

    <nav class="tab-bar">
        <button class="tab-item active" onclick="app.renderView('dash', this)"><i>🏠</i><span>Início</span></button>
        <button class="tab-item" onclick="app.renderView('agenda', this)"><i>📅</i><span>Agenda</span></button>
        <button class="tab-item" onclick="app.renderView('servicos', this)"><i>✂️</i><span>Serviços</span></button> 
        <button class="tab-item" onclick="app.renderView('prestadores', this)"><i>👥</i><span>Equipe</span></button>
        <button class="tab-item" onclick="app.renderView('estoque', this)"><i>📦</i><span>Estoque</span></button>
    </nav>

    <div id="modal-container" class="modal-overlay">
        <div class="bottom-sheet" id="modal-content"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
